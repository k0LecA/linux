background {
    monitor =
    path = screenshot  # takes screenshot of desktop as background
    blur_passes = 2
    blur_size = 5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(33ccffee)
    inner_color = rgba(0, 0, 0, 0.8)
    font_color = rgb(255, 255, 255)
    placeholder_text = <i>Password...</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 60
    position = 0, 100
    halign = center
    valign = center
}
